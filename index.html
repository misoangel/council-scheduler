<script>
async function saveData() {
    // --- 설정 ---
    const TOKEN = "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_"; 
    const USER = "misoangel"; 
    const REPO = "council-scheduler";
    const PATH = "schedule.csv";
    const BRANCH = "main";
    // ------------

    const title = document.getElementById('title').value;
    const type = document.getElementById('type').value;
    const start = document.getElementById('start').value;
    const end = document.getElementById('end').value;
    const comm = document.getElementById('comm_date').value;
    const is_member = document.getElementById('is_member').value;

    if (!title || !start || !end || !comm) {
        alert("빈칸 없이 다 입력해라 임마!");
        return;
    }

    const newRow = `${title},${type},${start},${end},${comm},${is_member}\n`;

    const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${PATH}`;

    try {
        // 1. 기존 파일 가져오기 (SHA 포함)
        const res = await fetch(url, {
            headers: {
                "Authorization": `Bearer ${TOKEN}`
                "Accept": "application/vnd.github+json"
            }
        });

        const text = await res.text();

        if (!res.ok) {
            console.error(text);
            throw new Error("파일 조회 실패: " + text);
        }

        const fileData = JSON.parse(text);

        // 2. 기존 내용 + 새 데이터
        const oldContent = decodeURIComponent(escape(atob(fileData.content)));
        const newContent = oldContent + newRow;

        // 3. base64 인코딩 (한글 안전)
        const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

        // 4. GitHub 업데이트
        const putRes = await fetch(url, {
            method: "PUT",
            headers: {
                "Authorization": `token ${TOKEN}`,
                "Content-Type": "application/json",
                "Accept": "application/vnd.github+json"
            },
            body: JSON.stringify({
                message: "일정 추가 (Web Input)",
                content: encodedContent,
                sha: fileData.sha,
                branch: BRANCH
            })
        });

        const putText = await putRes.text();

        if (!putRes.ok) {
            console.error(putText);
            throw new Error("업데이트 실패: " + putText);
        }

        alert("저장 완료. CSV에 정상 반영됨.");
        location.reload();

    } catch (err) {
        console.error(err);
        alert("에러: " + err.message);
    }
}
</script>
